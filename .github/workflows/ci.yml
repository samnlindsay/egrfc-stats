name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Compile Python files
        run: |
          python -m py_compile python/backend.py python/build_backend.py python/update.py python/league_data.py python/league_stats.py

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v
