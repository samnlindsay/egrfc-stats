<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Full Profile Appearances Preview</title>
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
  <style>
    body { font-family: "PT Sans Narrow", sans-serif; margin: 20px; background: #f2f1f4; color: #202946; }
    #controls { margin-bottom: 12px; display: flex; gap: 12px; flex-wrap: wrap; }
    select { padding: 6px 8px; }
    #chart { background: white; border-radius: 10px; padding: 10px; }
  </style>
</head>
<body>
  <h2>Full Profile Appearances Chart Preview</h2>
  <div id="controls">
    <label>Player <select id="player"></select></label>
    <label>Colour By <select id="mode"><option>Squad</option><option>Result</option><option>Position</option></select></label>
  </div>
  <div id="chart"></div>
  <script>
    const chartPaths = {
      Squad: './player_full_profile_appearances_per_season_squad.json',
      Result: './player_full_profile_appearances_per_season_result.json',
      Position: './player_full_profile_appearances_per_season_position.json'
    };
    const specsByMode = { Squad: null, Result: null, Position: null };

    function collectRows(spec) {
      const rows = [];
      if (spec.datasets) {
        Object.values(spec.datasets).forEach(v => { if (Array.isArray(v)) rows.push(...v); });
      }
      return rows;
    }

    function filterSpecByPlayer(spec, player) {
      const next = JSON.parse(JSON.stringify(spec));
      if (next.datasets) {
        Object.keys(next.datasets).forEach(k => {
          const rows = next.datasets[k];
          if (Array.isArray(rows)) next.datasets[k] = rows.filter(r => String(r.player || '') === player);
        });
      }
      return next;
    }

    async function render() {
      const player = document.getElementById('player').value;
      const mode = document.getElementById('mode').value;
      const baseSpec = specsByMode[mode];
      if (!baseSpec) {
        document.getElementById('chart').textContent = `Missing chart spec for ${mode}`;
        return;
      }
      const spec = filterSpecByPlayer(baseSpec, player);
      await vegaEmbed('#chart', spec, { actions: false, renderer: 'svg' });
    }

    Promise.all(
      Object.entries(chartPaths).map(async ([mode, path]) => {
        const response = await fetch(path);
        if (!response.ok) throw new Error(`Failed to load ${path} (${response.status})`);
        specsByMode[mode] = await response.json();
      })
    )
      .then(() => {
        const rows = collectRows(specsByMode.Squad || specsByMode.Result || specsByMode.Position || {});
        const players = [...new Set(rows.map(r => r.player).filter(Boolean))].sort();
        const sel = document.getElementById('player');
        players.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p;
          opt.textContent = p;
          sel.appendChild(opt);
        });
        sel.addEventListener('change', render);
        document.getElementById('mode').addEventListener('change', render);
        render();
      })
      .catch(err => {
        document.getElementById('chart').textContent = `Failed to load chart: ${err.message}`;
      });
  </script>
</body>
</html>
