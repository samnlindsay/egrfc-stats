            body {

                    width: 100%;

                display: flex;
                padding: 0.1rem;
                cursor: pointer;
                transition: all 0.3s;
                font-size: medium;
            }

            .vega-bind-radio input:checked+label {
                background-color: #202946;
                color: #e5e4e7;
            }

            

      .vega-embed {
