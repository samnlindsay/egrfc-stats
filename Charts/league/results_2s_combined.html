<style>
    #vis.vega-embed {
      width: 100%;
      display: flex;
    }

    #vis.vega-embed details,
    #vis.vega-embed details summary {
      position: relative;
    }
  

      body {
          margin: 0;
      }
  
      /* Default size for larger screens */
      .vega-embed {
          width: 100%;
          height: 100%;
          transform-origin: top left;
      }

      /* Scale for tablet devices */
      @media (max-width: 768px) {
          .vega-embed {
              transform: scale(0.75);
              width: 100%;
              height: 100%;
          }
      }

      /* Scale for mobile devices */
      @media (max-width: 480px) {
          .vega-embed {
              transform: scale(0.5);
              width: 100%;
              height: 100%;
          }
      }

      .chart-wrapper {
          display: grid;
          grid-template-columns: 1fr 1fr; /* Chart takes 3x space, form takes 1x */
      }

      .vega-bind {
        font-family: 'Lato', sans-serif !important;
        padding: 10px;
        padding-top: 5px;
        width: min-content;
      }
            
      .vega-bind-name {
        font-family: 'Lato', sans-serif !important;
        font-weight: bold;
        font-size: larger;
        color: #202946; 
      }

      .vega-bind-radio input {
        width: 1rem;
        height: 1rem;
      }

      .vega-bind-radio label {
        font-family: 'Lato', sans-serif;
        display: flex;
        padding: 0.1rem;
        cursor: pointer;
        transition: all 0.3s;
        font-size: medium;
      }

      .vega-bind-radio input:checked+label {
        background-color: #202946;
        color: #e5e4e7;
    }

                    if (typeof transform.filter === 'object' && transform.filter.param) {
                        return false;
                    }
                    if (typeof transform.filter === 'string' && transform.filter.includes('datum.Season')) {
                        return false;
                    }
                    return true;
                });
                targetSpec.transform.push({ filter: seasonFilter });
            };

            if (selectedSeason) {
                applySeasonFilter(spec, selectedSeason);

                const seasonLabel = formatSeasonLabel(selectedSeason);
                if (spec.title && seasonLabel) {
                    spec.title.text = '2nd XV League Results ' + seasonLabel;
                }
            }

            ensureTightLayout();
            [120, 350, 800, 1400, 2200].forEach((delay) => {
                window.setTimeout(trimBodyToVis, delay);
            });
            /* league_results_runtime_end */
    

      const el = document.getElementById('vis');
      vegaEmbed("#vis", spec, embedOpt)
        .catch(error => showError(el, error));
    })(vegaEmbed);

  
    document.addEventListener("DOMContentLoaded", function () {
      setTimeout(() => {
        window.dispatchEvent(new Event('resize'));
      }, 100);
    });
  </script>
</body>
